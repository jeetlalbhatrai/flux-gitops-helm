apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: app2-java
spec:
  interval: 5m
  chart:
    spec:
      chart: java-app-chart
      version: "1.0.0"
      sourceRef:
        kind: HelmRepository
        name: flux-gitops-helmcharts
        namespace: flux-system

  valuesFrom:
    - kind: ConfigMap
      name: app2-values