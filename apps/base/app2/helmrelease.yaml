apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: app2
  namespace: qa2
spec:
  interval: 5m

  chart:
    spec:
      chart: .   # ✅ ROOT path
      sourceRef:
        kind: GitRepository
        name: helm-charts-repo
        namespace: flux-system

  valuesFrom:
    - kind: ConfigMap
      name: app2-values