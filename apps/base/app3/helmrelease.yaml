apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: app3
  namespace: qa3
spec:
  interval: 5m

  chart:
    spec:
      chart: .   # ✅ ROOT path
      sourceRef:
        kind: GitRepository
        name: flux-gitops-helm
        namespace: flux-system

  valuesFrom:
    - kind: ConfigMap
      name: app3-values