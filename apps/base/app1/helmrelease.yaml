apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: app1
  namespace: qa1
spec:
  interval: 5m

  chart:
    spec:
      chart: .   # your chart is at repo root
      sourceRef:
        kind: GitRepository
        name: helm-charts-repo
        namespace: flux-system   # ✅ REQUIRED
      interval: 1m               # ✅ recommended

  values:
    replicaCount: 1

    image:
      repository: nginx
      tag: latest

    containerPort: 80

    service:
      port: 80